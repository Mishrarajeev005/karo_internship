spring.application.name=internship
server.port=8080

# Database Configuration
# These will use values from environment variables on Render, or defaults for local H2
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:internshipdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=true

# H2 Console (Local only)
spring.h2.console.enabled=true
